<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100vh;
    background: transparent;
    overflow:hidden;
    font-family: 'Courier New', monospace;
  }

  /* ===== طبقات المشاهد ===== */
  .scene { position:fixed; inset:0; opacity:0; pointer-events:none; }

  /* =============================
     مشهد 1 — عدسة قناص
  ============================= */
  #s1 { animation: showScene 18s linear infinite 0s; }

  .sniper-overlay {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
  }
  /* خطوط التقاطع */
  .cross-h {
    position:absolute; left:0; right:0;
    height:1.5px;
    background: linear-gradient(90deg, transparent 0%, #ff000099 30%, #ff0000 48%, #fff 50%, #ff0000 52%, #ff000099 70%, transparent 100%);
    top:50%;
    animation: crossScan 3s ease-in-out infinite;
    box-shadow: 0 0 8px #ff0000;
  }
  .cross-v {
    position:absolute; top:0; bottom:0;
    width:1.5px;
    background: linear-gradient(180deg, transparent 0%, #ff000099 30%, #ff0000 48%, #fff 50%, #ff0000 52%, #ff000099 70%, transparent 100%);
    left:50%;
    box-shadow: 0 0 8px #ff0000;
  }
  /* دائرة العدسة */
  .scope-ring {
    position:absolute;
    border-radius:50%;
    border:1.5px solid #ff000088;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
  }
  .scope-ring:nth-child(3) { width:40vmin; height:40vmin; border-color:#ff0000cc; box-shadow:0 0 20px #ff000044 inset, 0 0 20px #ff000044; animation: ringPulse 2s ease-in-out infinite; }
  .scope-ring:nth-child(4) { width:55vmin; height:55vmin; border-color:#ff000055; animation: ringPulse 2s ease-in-out infinite 0.3s; }
  .scope-ring:nth-child(5) { width:72vmin; height:72vmin; border-color:#ff000033; animation: ringPulse 2s ease-in-out infinite 0.6s; }
  /* أقواس الزوايا */
  .corner-scope {
    position:absolute;
    width:50px; height:50px;
    border-color:#ff0000;
    border-style:solid;
    border-width:0;
  }
  .cs-tl { top:10%; left:10%; border-top-width:2px; border-left-width:2px; box-shadow:-4px -4px 12px #ff000066; }
  .cs-tr { top:10%; right:10%; border-top-width:2px; border-right-width:2px; box-shadow:4px -4px 12px #ff000066; }
  .cs-bl { bottom:10%; left:10%; border-bottom-width:2px; border-left-width:2px; box-shadow:-4px 4px 12px #ff000066; }
  .cs-br { bottom:10%; right:10%; border-bottom-width:2px; border-right-width:2px; box-shadow:4px 4px 12px #ff000066; }
  /* معلومات القناص */
  .sniper-data {
    position:absolute;
    color:#ff0000cc;
    font-size:clamp(9px,1.2vw,13px);
    letter-spacing:3px;
    text-shadow:0 0 8px #ff0000;
    font-family:'Courier New',monospace;
  }
  .sd-tl { top:12%; left:12%; text-align:left; }
  .sd-tr { top:12%; right:12%; text-align:right; }
  .sd-bl { bottom:12%; left:12%; }
  .sd-br { bottom:12%; right:12%; text-align:right; }
  .sniper-dot {
    position:absolute; top:50%; left:50%;
    width:6px; height:6px; border-radius:50%;
    background:#ff0000;
    transform:translate(-50%,-50%);
    box-shadow:0 0 12px 4px #ff000088, 0 0 30px 8px #ff000033;
    animation:dotPulse 0.8s ease-in-out infinite;
  }
  /* تأثير فينيت حمراء */
  .vignette-red {
    position:absolute; inset:0;
    background: radial-gradient(ellipse at center, transparent 40%, #ff000022 70%, #ff000066 100%);
    animation: vignettePulse 2s ease-in-out infinite;
  }
  /* شريط scan */
  .scanline {
    position:absolute; left:0; right:0;
    height:2px;
    background: linear-gradient(90deg, transparent, #ff000033, transparent);
    animation: scanMove 4s linear infinite;
    top:0;
  }

  /* =============================
     مشهد 2 — كلمات glitch
  ============================= */
  #s2 { animation: showScene 18s linear infinite 6s; }

  .glitch-container {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:20px;
  }
  .glitch-word {
    font-size:clamp(50px,10vw,110px);
    font-weight:900;
    color:#fff;
    letter-spacing:10px;
    position:relative;
    text-shadow:0 0 20px #ff000088;
    animation:glitchText 0.15s steps(1) infinite;
    font-family:'Courier New',monospace;
  }
  .glitch-word::before {
    content:attr(data-text);
    position:absolute; inset:0;
    color:#ff0000;
    clip-path:polygon(0 30%,100% 30%,100% 50%,0 50%);
    animation:glitchBefore 0.3s steps(1) infinite;
    transform:translateX(-3px);
  }
  .glitch-word::after {
    content:attr(data-text);
    position:absolute; inset:0;
    color:#ffffff44;
    clip-path:polygon(0 60%,100% 60%,100% 80%,0 80%);
    animation:glitchAfter 0.25s steps(1) infinite;
    transform:translateX(3px);
  }
  .glitch-sub {
    font-size:clamp(12px,2vw,22px);
    color:#ff000099;
    letter-spacing:8px;
    animation:fadeInOut 0.5s ease-in-out infinite alternate;
    text-transform:uppercase;
  }
  /* خطوط أفقية glitch */
  .hline {
    position:absolute; left:0; right:0;
    height:1px;
    background:#ff000044;
  }
  /* تأثير noise */
  .noise {
    position:absolute; inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    opacity:0.15;
    pointer-events:none;
  }
  .red-flash {
    position:absolute; inset:0;
    background:#ff000008;
    animation:redFlash 0.1s steps(1) infinite;
  }

  /* =============================
     مشهد 3 — دخان يغطي الشاشة
  ============================= */
  #s3 { animation: showScene 18s linear infinite 12s; }

  .smoke-container { position:absolute; inset:0; }
  .smoke-particle {
    position:absolute;
    border-radius:50%;
    background: radial-gradient(circle, #333 0%, #111 40%, transparent 75%);
    opacity:0;
    animation:smokeRise var(--sd) ease-out var(--sdelay) infinite;
    filter:blur(var(--sblur));
  }
  .smoke-red {
    background: radial-gradient(circle, #660000 0%, #330000 40%, transparent 75%);
  }
  .smoke-text {
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    font-size:clamp(30px,7vw,80px);
    font-weight:900;
    color:#ff000044;
    letter-spacing:12px;
    text-shadow:0 0 40px #ff0000;
    animation:smokeFadeText 6s ease-in-out infinite;
    font-family:'Courier New',monospace;
  }
  /* خطوط إطار ===== */
  .frame-line {
    position:absolute;
    background:#ff000066;
    box-shadow:0 0 8px #ff000044;
  }
  .fl-top    { top:0;    left:0; right:0; height:2px; }
  .fl-bottom { bottom:0; left:0; right:0; height:2px; }
  .fl-left   { left:0;  top:0; bottom:0; width:2px; }
  .fl-right  { right:0; top:0; bottom:0; width:2px; }

  /* =============================
     كيينمات
  ============================= */
  @keyframes showScene {
    0%   { opacity:0; }
    2%   { opacity:1; }
    30%  { opacity:1; }
    33%  { opacity:0; }
    100% { opacity:0; }
  }

  @keyframes crossScan {
    0%,100% { transform:translateY(-3px) scaleX(1); }
    50%      { transform:translateY(3px)  scaleX(1.01); }
  }
  @keyframes ringPulse {
    0%,100% { opacity:0.7; transform:translate(-50%,-50%) scale(1); }
    50%      { opacity:1;   transform:translate(-50%,-50%) scale(1.02); }
  }
  @keyframes dotPulse {
    0%,100% { box-shadow:0 0 12px 4px #ff000088, 0 0 30px 8px #ff000033; }
    50%      { box-shadow:0 0 20px 8px #ff0000cc, 0 0 50px 16px #ff000066; }
  }
  @keyframes vignettePulse {
    0%,100% { opacity:0.7; }
    50%      { opacity:1; }
  }
  @keyframes scanMove {
    0%   { top:0%;   opacity:0; }
    5%   { opacity:1; }
    95%  { opacity:0.3; }
    100% { top:100%; opacity:0; }
  }

  @keyframes glitchText {
    0%,94%  { transform:translate(0); }
    95%     { transform:translate(-2px,1px); }
    96%     { transform:translate(2px,-1px); }
    97%     { transform:translate(-1px,2px) skewX(1deg); }
    100%    { transform:translate(0); }
  }
  @keyframes glitchBefore {
    0%,89%  { opacity:0; clip-path:polygon(0 30%,100% 30%,100% 50%,0 50%); }
    90%     { opacity:1; clip-path:polygon(0 20%,100% 20%,100% 45%,0 45%); transform:translateX(-4px); }
    92%     { clip-path:polygon(0 50%,100% 50%,100% 65%,0 65%); transform:translateX(3px); }
    95%     { opacity:0; }
    100%    { opacity:0; }
  }
  @keyframes glitchAfter {
    0%,85%  { opacity:0; }
    86%     { opacity:1; transform:translateX(4px); }
    89%     { transform:translateX(-3px); }
    92%     { opacity:0; }
    100%    { opacity:0; }
  }
  @keyframes fadeInOut {
    from { opacity:0.3; }
    to   { opacity:1; }
  }
  @keyframes redFlash {
    0%,96% { opacity:0; }
    97%    { opacity:1; }
    100%   { opacity:0; }
  }

  @keyframes smokeRise {
    0%   { opacity:0; transform:translate(0,0)          scale(0.3) rotate(0deg); }
    10%  { opacity:0.6; }
    60%  { opacity:0.4; transform:translate(var(--sdx),calc(var(--sdy)*0.6)) scale(1.4) rotate(var(--srot)); }
    100% { opacity:0;   transform:translate(var(--sdx),var(--sdy)) scale(2.2) rotate(calc(var(--srot)*2)); }
  }
  @keyframes smokeFadeText {
    0%,100% { opacity:0; }
    30%,70% { opacity:1; }
  }
</style>
</head>
<body>

<!-- مشهد 1: عدسة القناص -->
<div class="scene" id="s1">
  <div class="vignette-red"></div>
  <div class="scanline"></div>
  <div class="sniper-overlay">
    <div class="cross-h"></div>
    <div class="cross-v"></div>
    <div class="scope-ring"></div>
    <div class="scope-ring"></div>
    <div class="scope-ring"></div>
    <div class="sniper-dot"></div>
  </div>
  <div class="corner-scope cs-tl"></div>
  <div class="corner-scope cs-tr"></div>
  <div class="corner-scope cs-bl"></div>
  <div class="corner-scope cs-br"></div>
  <div class="sniper-data sd-tl">ZOOM: 4.2x<br>DIST: 847m<br>WIND: 3ms→</div>
  <div class="sniper-data sd-tr">TARGET: LOCKED<br>STATUS: ████<br>MODE: ACTIVE</div>
  <div class="sniper-data sd-bl">LAT: 36.7°N<br>LON: 3.0°E<br>ALT: 742m</div>
  <div class="sniper-data sd-br">HEAT: 38°C<br>PRESS: 1013mb<br>▌▌▌▌▌▌▌▌</div>
  <div class="frame-line fl-top"></div>
  <div class="frame-line fl-bottom"></div>
  <div class="frame-line fl-left"></div>
  <div class="frame-line fl-right"></div>
</div>

<!-- مشهد 2: كلمات glitch -->
<div class="scene" id="s2">
  <div class="noise"></div>
  <div class="red-flash"></div>
  <div class="glitch-container">
    <div class="glitch-word" data-text="عماد">عماد</div>
    <div class="glitch-word" data-text="قبارة" style="font-size:clamp(40px,8vw,90px);color:#ff0000;">قبارة</div>
    <div class="glitch-sub">◈ LIVE NOW ◈ البث مباشر ◈</div>
  </div>
  <div class="hline" style="top:20%;"></div>
  <div class="hline" style="top:80%;"></div>
  <div class="frame-line fl-top"></div>
  <div class="frame-line fl-bottom"></div>
  <div class="frame-line fl-left"></div>
  <div class="frame-line fl-right"></div>
</div>

<!-- مشهد 3: دخان -->
<div class="scene" id="s3">
  <div class="smoke-container" id="smokeC"></div>
  <div class="smoke-text">◈ عماد قبارة ◈</div>
  <div class="frame-line fl-top"></div>
  <div class="frame-line fl-bottom"></div>
  <div class="frame-line fl-left"></div>
  <div class="frame-line fl-right"></div>
</div>

<script>
  // توليد جزيئات الدخان
  const sc = document.getElementById("smokeC");
  for (let i = 0; i < 35; i++) {
    const p = document.createElement("div");
    p.className = "smoke-particle" + (Math.random()>0.7 ? " smoke-red" : "");
    const sz  = Math.random()*250+100;
    const dx  = ((Math.random()-0.5)*300).toFixed(0)+"px";
    const dy  = -(Math.random()*500+200).toFixed(0)+"px";
    const rot = ((Math.random()-0.5)*180).toFixed(0)+"deg";
    const blur= (Math.random()*40+20).toFixed(0)+"px";
    const dur = (Math.random()*4+4).toFixed(1)+"s";
    const del = -(Math.random()*8).toFixed(1)+"s";
    p.style.cssText =
      "width:"+sz+"px;height:"+sz+"px;" +
      "left:"+(Math.random()*120-10)+"%;bottom:"+(Math.random()*30-10)+"%;" +
      "--sdx:"+dx+";--sdy:"+dy+";--srot:"+rot+";--sblur:"+blur+";" +
      "--sd:"+dur+";--sdelay:"+del+";";
    sc.appendChild(p);
  }
</script>

</body>
</html>
