<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Live - عماد قبارة</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw; height: 100vh;
    background: transparent;
    overflow: hidden;
    font-family: 'Tajawal', sans-serif;
  }

  /* ===== الخلفية ===== */
  .bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, #0a0a0a 0%, #000000 100%);
    opacity: 0;
    animation: fadeInBg 0.8s ease forwards 0.2s;
  }

  /* ===== جزيئات ذهبية ===== */
  .particles { position: absolute; inset: 0; overflow: hidden; }
  .particle {
    position: absolute;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: #c9a84c;
    opacity: 0;
    animation: floatParticle linear infinite;
  }

  /* ===== خط ذهبي علوي ===== */
  .top-line {
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #c9a84c, #f5d77e, #c9a84c, transparent);
    transform: scaleX(0);
    animation: expandLine 1s cubic-bezier(0.4,0,0.2,1) forwards 0.5s;
  }
  .bottom-line {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #c9a84c, #f5d77e, #c9a84c, transparent);
    transform: scaleX(0);
    animation: expandLine 1s cubic-bezier(0.4,0,0.2,1) forwards 0.5s;
  }

  /* ===== الحاوية الرئيسية ===== */
  .container {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    width: 100%; height: 100%;
    gap: 0;
  }

  /* ===== أيقونة التاج ===== */
  .crown-wrap {
    opacity: 0;
    transform: translateY(-30px) scale(0.5);
    animation: dropIn 0.8s cubic-bezier(0.34,1.56,0.64,1) forwards 1s;
    margin-bottom: 10px;
  }
  .crown {
    font-size: 64px;
    filter: drop-shadow(0 0 20px #c9a84c) drop-shadow(0 0 40px #c9a84c88);
    animation: pulseCrown 2s ease-in-out infinite 2s;
  }

  /* ===== الخط الفاصل ===== */
  .divider {
    width: 0; height: 1px;
    background: linear-gradient(90deg, transparent, #c9a84c, #f5d77e, #c9a84c, transparent);
    margin: 14px 0;
    animation: expandDiv 0.8s ease forwards 1.6s;
  }

  /* ===== كلمة ترحيب ===== */
  .welcome-text {
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 8px;
    color: #c9a84c;
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(10px);
    animation: riseIn 0.7s ease forwards 1.3s;
    text-shadow: 0 0 20px #c9a84c66;
  }

  /* ===== الاسم الرئيسي ===== */
  .name-wrap {
    position: relative;
    opacity: 0;
    transform: scale(0.8);
    animation: nameReveal 1s cubic-bezier(0.34,1.2,0.64,1) forwards 1.7s;
    margin-bottom: 6px;
  }
  .name {
    font-size: 72px;
    font-weight: 900;
    background: linear-gradient(135deg, #b8860b 0%, #f5d77e 40%, #ffd700 60%, #c9a84c 80%, #b8860b 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 4px 20px #c9a84c55);
    line-height: 1;
  }
  .name-glow {
    position: absolute; inset: 0;
    font-size: 72px;
    font-weight: 900;
    color: #c9a84c;
    filter: blur(18px);
    opacity: 0.25;
    line-height: 1;
    animation: glowPulse 2.5s ease-in-out infinite 3s;
  }

  /* ===== الخط الثاني ===== */
  .divider2 {
    width: 0; height: 1px;
    background: linear-gradient(90deg, transparent, #c9a84c88, transparent);
    margin: 14px 0;
    animation: expandDiv2 0.6s ease forwards 2.5s;
  }

  /* ===== النص السفلي ===== */
  .sub-text {
    font-size: 15px;
    font-weight: 400;
    color: #8a7340;
    letter-spacing: 4px;
    opacity: 0;
    animation: riseIn 0.7s ease forwards 2.6s;
  }

  /* ===== ركن ذهبي ===== */
  .corner { position: absolute; width: 40px; height: 40px; }
  .corner::before, .corner::after { content:''; position:absolute; background:#c9a84c; }
  .corner::before { width: 100%; height: 2px; }
  .corner::after { width: 2px; height: 100%; }
  .corner-tl { top: 30px; left: 30px; opacity:0; animation: fadeInBg 0.5s ease forwards 0.8s; }
  .corner-tr { top: 30px; right: 30px; transform: scaleX(-1); opacity:0; animation: fadeInBg 0.5s ease forwards 0.9s; }
  .corner-bl { bottom: 30px; left: 30px; transform: scaleY(-1); opacity:0; animation: fadeInBg 0.5s ease forwards 1s; }
  .corner-br { bottom: 30px; right: 30px; transform: scale(-1); opacity:0; animation: fadeInBg 0.5s ease forwards 1.1s; }

  /* ===== هلال مضيء ===== */
  .halo {
    position: absolute;
    width: 320px; height: 320px;
    border-radius: 50%;
    border: 1px solid #c9a84c22;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    animation: expandHalo 1.5s ease-out forwards 1.5s;
    box-shadow: 0 0 60px #c9a84c11 inset;
  }
  .halo2 {
    position: absolute;
    width: 450px; height: 450px;
    border-radius: 50%;
    border: 1px solid #c9a84c11;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    animation: expandHalo 1.8s ease-out forwards 1.8s;
  }

  /* ===== كيينمات ===== */
  @keyframes fadeInBg { to { opacity: 1; } }
  @keyframes expandLine { to { transform: scaleX(1); } }
  @keyframes expandDiv { to { width: 260px; } }
  @keyframes expandDiv2 { to { width: 180px; } }
  @keyframes dropIn { to { opacity:1; transform: translateY(0) scale(1); } }
  @keyframes riseIn { to { opacity:1; transform: translateY(0); } }
  @keyframes nameReveal { to { opacity:1; transform: scale(1); } }
  @keyframes expandHalo { to { transform: translate(-50%,-50%) scale(1); } }
  @keyframes pulseCrown {
    0%,100% { filter: drop-shadow(0 0 20px #c9a84c) drop-shadow(0 0 40px #c9a84c88); }
    50% { filter: drop-shadow(0 0 30px #ffd700) drop-shadow(0 0 60px #c9a84c); }
  }
  @keyframes glowPulse {
    0%,100% { opacity: 0.25; }
    50% { opacity: 0.45; }
  }
  @keyframes floatParticle {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.4; }
    100% { transform: translateY(-100px) translateX(var(--drift)); opacity: 0; }
  }
</style>
</head>
<body>

<div class="bg"></div>

<!-- الجزيئات الذهبية -->
<div class="particles" id="particles"></div>

<!-- الهاله -->
<div class="halo"></div>
<div class="halo2"></div>

<!-- خطوط الإطار -->
<div class="top-line"></div>
<div class="bottom-line"></div>

<!-- أركان -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- المحتوى -->
<div class="container">
  <div class="crown-wrap"><div class="crown">👑</div></div>
  <div class="welcome-text">مرحباً بكم في بث</div>
  <div class="divider"></div>
  <div class="name-wrap">
    <div class="name-glow">عماد قبارة</div>
    <div class="name">عماد قبارة</div>
  </div>
  <div class="divider2"></div>
  <div class="sub-text">LIVE NOW • ابدأ التفاعل</div>
</div>

<script>
  // توليد الجزيئات الذهبية
  const container = document.getElementById('particles');
  for (let i = 0; i < 35; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 3 + 1;
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${size}px;
      height: ${size}px;
      --drift: ${(Math.random() - 0.5) * 100}px;
      animation-duration: ${Math.random() * 6 + 5}s;
      animation-delay: ${Math.random() * 4}s;
      background: ${Math.random() > 0.5 ? '#c9a84c' : '#f5d77e'};
    `;
    container.appendChild(p);
  }

  // إعادة التشغيل كل 6 ثوانٍ
  setTimeout(() => {
    document.querySelectorAll('[style*="animation"]').forEach(el => {
      el.style.animation = 'none';
    });
  }, 20000);
</script>
</body>
</html>
