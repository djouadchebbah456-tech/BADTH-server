<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Overlay - بثّ</title>
<style>
  /* Transparent background for OBS Browser Source */
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: 'Cairo', sans-serif;
  }

  #stage {
    position: fixed;
    inset: 0;
    pointer-events: none;
  }

  .effect-layer {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity .25s ease;
  }
  .effect-layer.show { opacity: 1; }

  .effect-layer video,
  .effect-layer img {
    max-width: 100%;
    max-height: 100%;
  }

  /* Gift toast */
  #toast {
    position: absolute;
    bottom: 5%;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(15,16,22,0.85);
    border: 1px solid rgba(255,200,87,0.4);
    border-radius: 14px;
    padding: 10px 22px;
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0;
    transition: all .35s ease;
    backdrop-filter: blur(6px);
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast .icon { font-size: 30px; }
  #toast .sub { font-size: 14px; color: #9aa1b1; font-weight: 500; }

  /* Status indicator (auto-hides) */
  #status {
    position: absolute;
    top: 16px; right: 16px;
    font-size: 13px;
    background: rgba(0,0,0,0.5);
    color: #7bf1ff;
    padding: 6px 14px;
    border-radius: 8px;
    opacity: 0.85;
  }
</style>
</head>
<body>

<div id="stage">
  <div id="status">جاري الاتصال...</div>
  <div id="toast"></div>
</div>

<script>
/* =========================================================
   CONFIGURATION
   - Set your server URL and TikTok username below, or pass
     them as query params:
       overlay.html?server=wss://your-app.onrender.com&user=YOUR_TIKTOK_USERNAME
   ========================================================= */
const params = new URLSearchParams(location.search);
const SERVER_URL = params.get('server') || 'wss://YOUR-SERVER.onrender.com';
const TIKTOK_USER = params.get('user') || 'YOUR_TIKTOK_USERNAME';

/* =========================================================
   EFFECT MAPPING
   Loaded from the `config` URL parameter (base64-encoded JSON),
   generated by the dashboard. Falls back to a default mapping
   if no config is provided (useful for quick testing).
   ========================================================= */
const DEFAULT_const EFFECT_MAP = {   gifts: {     'rose':    'effects/kabs-kabs.html',     'lion':    'effects/overlay-dramatic.html',     'galaxy':  'effects/welcome-emad-live.html',     'tiktok universe': 'effects/top3-supporters.html',   },   follow: 'effects/welcome-emad-live.html',   share:  'effects/kabs-kabs.html',   likeThreshold: 100,   likeEffect: 'effects/overlay-dramatic.html', }; = {
  gifts: {
    'rose':   'effects/rose-storm.mp4',
    'lion':   'effects/lion-roar.mp4',
    'galaxy': 'effects/fireworks.mp4',
    'tiktok universe': 'effects/dragon.mp4',
  },
  follow: 'effects/golden-glow.mp4',
  share:  'effects/energy-wave.mp4',
  likeThreshold: 100,
  likeEffect: 'effects/hearts-fall.mp4',
};

let const EFFECT_MAP = {   gifts: {     'rose':    'effects/kabs-kabs.html',     'lion':    'effects/overlay-dramatic.html',     'galaxy':  'effects/welcome-emad-live.html',     'tiktok universe': 'effects/top3-supporters.html',   },   follow: 'effects/welcome-emad-live.html',   share:  'effects/kabs-kabs.html',   likeThreshold: 100,   likeEffect: 'effects/overlay-dramatic.html', }; = DEFAULT_const EFFECT_MAP = {   gifts: {     'rose':    'effects/kabs-kabs.html',     'lion':    'effects/overlay-dramatic.html',     'galaxy':  'effects/welcome-emad-live.html',     'tiktok universe': 'effects/top3-supporters.html',   },   follow: 'effects/welcome-emad-live.html',   share:  'effects/kabs-kabs.html',   likeThreshold: 100,   likeEffect: 'effects/overlay-dramatic.html', };;
const configParam = params.get('config');
if (configParam) {
  try {
    const decoded = JSON.parse(decodeURIComponent(atob(configParam)));
    const EFFECT_MAP = {   gifts: {     'rose':    'effects/kabs-kabs.html',     'lion':    'effects/overlay-dramatic.html',     'galaxy':  'effects/welcome-emad-live.html',     'tiktok universe': 'effects/top3-supporters.html',   },   follow: 'effects/welcome-emad-live.html',   share:  'effects/kabs-kabs.html',   likeThreshold: 100,   likeEffect: 'effects/overlay-dramatic.html', }; = { ...DEFAULT_const EFFECT_MAP = {   gifts: {     'rose':    'effects/kabs-kabs.html',     'lion':    'effects/overlay-dramatic.html',     'galaxy':  'effects/welcome-emad-live.html',     'tiktok universe': 'effects/top3-supporters.html',   },   follow: 'effects/welcome-emad-live.html',   share:  'effects/kabs-kabs.html',   likeThreshold: 100,   likeEffect: 'effects/overlay-dramatic.html', };, ...decoded };
  } catch (e) {
    console.warn('Invalid config param, using default effect map.', e);
  }
}

let likeCounter = 0;

function connect() {
  const url = `${SERVER_URL}?user=${encodeURIComponent(TIKTOK_USER)}`;
  const ws = new WebSocket(url);

  ws.onopen = () => setStatus('متصل، بانتظار الأحداث...');
  ws.onclose = () => { setStatus('انقطع الاتصال، إعادة المحاولة...'); setTimeout(connect, 3000); };
  ws.onerror = () => setStatus('خطأ في الاتصال');

  ws.onmessage = (msg) => {
    let data;
    try { data = JSON.parse(msg.data); } catch { return; }
    handleEvent(data);
  };
}

function setStatus(text) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.style.display = 'block';
  clearTimeout(el._hideTimer);
  el._hideTimer = setTimeout(() => { el.style.display = 'none'; }, 4000);
}

function handleEvent(data) {
  switch (data.type) {
    case 'status':
      setStatus('الحالة: ' + data.status);
      break;

    case 'gift': {
      const key = (data.giftName || '').toLowerCase();
      const file = const EFFECT_MAP = {   gifts: {     'rose':    'effects/kabs-kabs.html',     'lion':    'effects/overlay-dramatic.html',     'galaxy':  'effects/welcome-emad-live.html',     'tiktok universe': 'effects/top3-supporters.html',   },   follow: 'effects/welcome-emad-live.html',   share:  'effects/kabs-kabs.html',   likeThreshold: 100,   likeEffect: 'effects/overlay-dramatic.html', };.gifts[key];
      showToast('🎁', `${data.nickname || data.user} أرسل ${data.giftName} x${data.repeatCount || 1}`);
      if (file) playEffect(file);
      break;
    }

    case 'follow':
      showToast('➕', `${data.nickname || data.user} بدأ المتابعة`);
      if (const EFFECT_MAP = {   gifts: {     'rose':    'effects/kabs-kabs.html',     'lion':    'effects/overlay-dramatic.html',     'galaxy':  'effects/welcome-emad-live.html',     'tiktok universe': 'effects/top3-supporters.html',   },   follow: 'effects/welcome-emad-live.html',   share:  'effects/kabs-kabs.html',   likeThreshold: 100,   likeEffect: 'effects/overlay-dramatic.html', };.follow) playEffect(const EFFECT_MAP = {   gifts: {     'rose':    'effects/kabs-kabs.html',     'lion':    'effects/overlay-dramatic.html',     'galaxy':  'effects/welcome-emad-live.html',     'tiktok universe': 'effects/top3-supporters.html',   },   follow: 'effects/welcome-emad-live.html',   share:  'effects/kabs-kabs.html',   likeThreshold: 100,   likeEffect: 'effects/overlay-dramatic.html', };.follow);
      break;

    case 'share':
      showToast('📤', `${data.nickname || data.user} شارك البث`);
      if (const EFFECT_MAP = {   gifts: {     'rose':    'effects/kabs-kabs.html',     'lion':    'effects/overlay-dramatic.html',     'galaxy':  'effects/welcome-emad-live.html',     'tiktok universe': 'effects/top3-supporters.html',   },   follow: 'effects/welcome-emad-live.html',   share:  'effects/kabs-kabs.html',   likeThreshold: 100,   likeEffect: 'effects/overlay-dramatic.html', };.share) playEffect(const EFFECT_MAP = {   gifts: {     'rose':    'effects/kabs-kabs.html',     'lion':    'effects/overlay-dramatic.html',     'galaxy':  'effects/welcome-emad-live.html',     'tiktok universe': 'effects/top3-supporters.html',   },   follow: 'effects/welcome-emad-live.html',   share:  'effects/kabs-kabs.html',   likeThreshold: 100,   likeEffect: 'effects/overlay-dramatic.html', };.share);
      break;

    case 'like':
      likeCounter += data.likeCount || 1;
      if (likeCounter >= const EFFECT_MAP = {   gifts: {     'rose':    'effects/kabs-kabs.html',     'lion':    'effects/overlay-dramatic.html',     'galaxy':  'effects/welcome-emad-live.html',     'tiktok universe': 'effects/top3-supporters.html',   },   follow: 'effects/welcome-emad-live.html',   share:  'effects/kabs-kabs.html',   likeThreshold: 100,   likeEffect: 'effects/overlay-dramatic.html', };.likeThreshold) {
        likeCounter = 0;
        if (const EFFECT_MAP = {   gifts: {     'rose':    'effects/kabs-kabs.html',     'lion':    'effects/overlay-dramatic.html',     'galaxy':  'effects/welcome-emad-live.html',     'tiktok universe': 'effects/top3-supporters.html',   },   follow: 'effects/welcome-emad-live.html',   share:  'effects/kabs-kabs.html',   likeThreshold: 100,   likeEffect: 'effects/overlay-dramatic.html', };.likeEffect) playEffect(const EFFECT_MAP = {   gifts: {     'rose':    'effects/kabs-kabs.html',     'lion':    'effects/overlay-dramatic.html',     'galaxy':  'effects/welcome-emad-live.html',     'tiktok universe': 'effects/top3-supporters.html',   },   follow: 'effects/welcome-emad-live.html',   share:  'effects/kabs-kabs.html',   likeThreshold: 100,   likeEffect: 'effects/overlay-dramatic.html', };.likeEffect);
      }
      break;
  }
}

/* =========================================================
   EFFECT PLAYBACK
   Creates a fullscreen layer, plays the video once, removes it.
   ========================================================= */
function playEffect(src) {   const stage = document.getElementById('stage');   const layer = document.createElement('div');   layer.className = 'effect-layer';    const isHTML = /\.html$/i.test(src);   const isVideo = /\.(mp4|webm)$/i.test(src);    let media;    if (isHTML) {     media = document.createElement('iframe');     media.src = src;     media.style.cssText = 'width:100%;height:100%;border:none;background:transparent;';     media.allowTransparency = true;     setTimeout(removeLayer, 5000);   } else if (isVideo) {     media = document.createElement('video');     media.src = src;     media.autoplay = true;     media.muted = false;     media.playsInline = true;     media.onended = () => removeLayer();   } else {     media = document.createElement('img');     media.src = src;     setTimeout(removeLayer, 3000);   }    function removeLayer() {     layer.classList.remove('show');     setTimeout(() => layer.remove(), 300);   }    layer.appendChild(media);   stage.appendChild(layer);   requestAnimationFrame(() => layer.classList.add('show')); }
  const stage = document.getElementById('stage');

  const layer = document.createElement('div');
  layer.className = 'effect-layer';

  const isVideo = /\.(mp4|webm)$/i.test(src);
  let media;
  if (isVideo) {
    media = document.createElement('video');
    media.src = src;
    media.autoplay = true;
    media.muted = false; // set true if you don't want effect audio
    media.playsInline = true;
    media.onended = () => removeLayer();
  } else {
    media = document.createElement('img');
    media.src = src;
    setTimeout(removeLayer, 3000); // images stay 3s by default
  }

  layer.appendChild(media);
  stage.appendChild(layer);
  requestAnimationFrame(() => layer.classList.add('show'));

  function removeLayer() {
    layer.classList.remove('show');
    setTimeout(() => layer.remove(), 300);
  }
}

/* =========================================================
   GIFT TOAST
   ========================================================= */
function showToast(icon, text) {
  const toast = document.getElementById('toast');
  toast.innerHTML = `<span class="icon">${icon}</span><span>${text}</span>`;
  toast.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove('show'), 4000);
}

connect();
</script>
</body>
</html>
